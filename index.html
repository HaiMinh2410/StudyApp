<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Practice App</title>
</head>

<body class="bg-base-200 min-h-screen font-sans">

    <!-- Responsive Drawer: Open by default on LG screens -->
    <div class="drawer">
        <input id="my-drawer" type="checkbox" class="drawer-toggle" />

        <div class="drawer-content flex flex-col h-screen overflow-hidden bg-base-200">
            <!-- Navbar -->
            <header class="navbar bg-primary text-primary-content sticky top-0 z-50 shadow-md lg:shadow-sm px-4">

                <div class="flex-1">
                    <a onclick="document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'})"
                        class="btn btn-ghost text-xl font-black tracking-tight uppercase cursor-pointer">English
                        Practice</a>
                </div>
                <div class="flex-none gap-2 px-2 flex items-center">
                    <!-- Theme Toggle -->
                    <button id="themeToggle" class="btn btn-ghost btn-circle">
                        <!-- Sun icon (visible in dark mode) -->
                        <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke-width="2" stroke="currentColor" class="hidden w-6 h-6 text-yellow-400">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                        </svg>
                        <!-- Moon icon (visible in light mode) -->
                        <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke-width="2" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                        </svg>
                    </button>
                </div>
                <div class="flex-none">
                    <label for="my-drawer" class="btn btn-square btn-ghost">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            class="inline-block w-6 h-6 stroke-current">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </label>
                </div>
            </header>

            <!-- Page Content -->
            <main id="mainContent" class="flex-1 overflow-y-auto custom-scrollbar">
                <div class="max-w-6xl mx-auto p-4 lg:p-10 space-y-8 pb-32 lg:pb-12">

                    <!-- Hero Section / Welcome -->
                    <section class="space-y-2">
                        <h1 class="text-3xl lg:text-4xl font-extrabold text-base-content tracking-tight">Practice
                            Dashboard</h1>
                        <p class="text-base-content/60">Generate and evaluate your English multi-choice questions in
                            seconds.</p>
                    </section>

                    <!-- Create Exercise card -->
                    <section class="card bg-base-100 shadow-sm border border-base-300">
                        <div class="card-body gap-6">
                            <div class="flex items-center gap-3">
                                <div
                                    class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M12 4v16m8-8H4" />
                                    </svg>
                                </div>
                                <h2 class="card-title text-2xl font-bold">New Exercise</h2>
                            </div>

                            <div class="form-control w-full space-y-2">
                                <label class="label w-full">
                                    <span class="label-text font-medium">Input MCQ or Fill-in-blank Data</span>
                                    <span class="label-text-alt opacity-50 italic">Questions + (Options/Answer) +
                                        Explanation</span>
                                </label>
                                <textarea id="inputData"
                                    class="textarea w-full textarea-bordered h-56 focus:textarea-primary transition-all no-scrollbar"
                                    placeholder="MCQ:&#10;1. Question?&#10;A) Opt1&#10;B) Opt2&#10;ANSWER KEY&#10;1. A) Explanation&#10;&#10;Fill-blank:&#10;1. Question __________ (hint).&#10;1. Question answer.&#10;→ Explanation"></textarea>

                                <!-- Error Alert (Hidden by default) -->
                                <div id="inputErrorAlert"
                                    class="hidden alert alert-error shadow-lg mt-4 animate-in fade-in slide-in-from-top-2 duration-300">
                                    <div class="flex flex-col items-start gap-1 w-full text-error-content">
                                        <div class="flex items-center gap-2 font-bold mb-1">
                                            <svg xmlns="http://www.w3.org/2000/svg"
                                                class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                            <span>Lỗi định dạng dữ liệu</span>
                                        </div>
                                        <ul id="errorList" class="list-disc list-inside text-xs space-y-1 opacity-90">
                                            <!-- Errors injected here -->
                                        </ul>
                                    </div>
                                </div>
                            </div>

                            <div class="card-actions justify-between lg:justify-end gap-2">
                                <button id="clearInputBtn" disabled onclick="clearInput()"
                                    class="btn btn-ghost btn-lg px-8 gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                    Clear
                                </button>
                                <button id="generateExerciseBtn" disabled onclick="generateExercise()"
                                    class="btn btn-primary btn-lg px-12 gap-2 shadow-lg shadow-primary/20">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M13 10V3L4 14h7v7l9-11h-7z" />
                                    </svg>
                                    Generate
                                </button>
                            </div>


                        </div>
                    </section>

                    <!-- Exercise Container -->
                    <section id="exerciseContainer" class="grid grid-cols-1 gap-6">
                        <!-- Questions injected here -->
                    </section>
                </div>
            </main>

            <!-- Bottom Navigation: MOBILE ONLY (Material Design Style) -->
            <div class="btm-nav lg:hidden flex items-center justify-around bg-white border-t border-base-300 h-14 z-50">
                <button id="submitBottomBtn" disabled onclick="submitAnswers()"
                    class="group flex-1 h-14 flex justify-center">
                    <div
                        class="flex items-center justify-center group-active:bg-primary/30 transition-all duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="size-8 text-green-500 group-disabled:text-base-content/20" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                </button>
                <button id="resetBottomBtn" disabled onclick="resetExercise()"
                    class="group flex-1 h-14 flex justify-center">
                    <div class="rounded-full flex items-center justify-center transition-all duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="size-8 text-yellow-400 group-disabled:text-base-content/20" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </div>
                </button>
                <button onclick="document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'})"
                    class="group h-14 flex-1 flex justify-center">
                    <div class="rounded-full flex items-center justify-centertransition-all duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="size-8 text-black" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M5 10l7-7m0 0l7 7m-7-7v18" />
                        </svg>
                    </div>
                </button>
            </div>

            <!-- Floating Sidebar Actions: DESKTOP ONLY -->
            <div class="hidden lg:flex items-center gap-3 fixed bottom-10 right-10 z-[100]">
                <button id="desktopResetBtn" disabled onclick="resetExercise()"
                    class="btn btn-warning btn-circle size-14 hover:scale-110 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="size-8" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
                <button id="desktopSubmitBtn" disabled onclick="submitAnswers()"
                    class="btn btn-primary btn-circle size-14 hover:scale-110 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="size-8" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </button>
                <button onclick="document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'})"
                    class="btn btn-circle btn-neutral size-10 hover:scale-110 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="size-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M5 10l7-7m0 0l7 7m-7-7v18" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Sidebar -->
        <aside class="drawer-side z-[60] border-r border-base-300">
            <label for="my-drawer" class="drawer-overlay"></label>
            <div class="flex flex-col w-90 lg:w-118 min-h-full bg-base-100 text-base-content">
                <div class="p-6 border-b border-base-200 flex justify-between items-center">
                    <h3 class="text-sm font-black uppercase tracking-widest text-base-content/50">Activity History</h3>
                    <button onclick="clearHistory()"
                        class="btn btn-error btn-xs bg-error/10 border-none text-error hover:bg-error hover:text-white transition-all px-4 font-bold">Clear</button>
                </div>
                <!-- Search/Filter could go here -->
                <nav id="historyContainer" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                    <!-- Items -->
                </nav>
                <div class="p-4 bg-base-200/50 border-t border-base-200">
                    <p class="text-[10px] text-center opacity-40 uppercase font-bold tracking-tighter">Your recent study
                        records</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- Custom Modal for Submit Confirmation -->
    <dialog id="submitModal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <h3 class="font-bold text-lg" id="modalTitle">Xác nhận nộp bài</h3>
            <p class="py-4" id="modalMessage">Bạn có chắc chắn muốn nộp bài không?</p>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-ghost" id="modalCancelBtn">Làm tiếp</button>
                    <button class="btn btn-primary ml-2" id="modalConfirmBtn" onclick="window.processSubmission()">Nộp
                        bài</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
